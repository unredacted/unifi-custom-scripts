# conf/example.conf — Template for new sites
#
# One interface name per line.  Comments with '#' are ignored.
# Copy this file to conf/$(hostname).conf on each device and list
# the bridge interfaces where ubios-udapi-server's arping should be
# silently skipped (typically only IXP peering bridges).
#
# On an IX fabric, arping-based neighbor refresh violates AMS-IX / SIX
# policy which requires a 4-hour ARP cache timeout.  Kernel NUD
# handles real reachability via BGP dst_confirm() so nothing is lost
# by suppressing the arping refresh.
#
# Do NOT list regular LAN bridges here — UniFi legitimately needs
# arping on those for client discovery and topology.

# Example: peering fabric bridges
#br3996
#br3997
#br3998
#br3999
