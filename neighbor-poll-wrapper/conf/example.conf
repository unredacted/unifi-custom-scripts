# conf/example.conf — Template for new sites
#
# One interface name per line.  Comments with '#' are ignored.
# Copy this file to conf/$(hostname).conf on each device and list
# the bridge interfaces where ubios-udapi-server's nl-neighbors-poll
# probes should be silently skipped (typically only IXP peering bridges).
#
# Wraps both probe binaries that ubios-udapi-server uses:
#   /usr/sbin/arping  (IPv4 — broadcast ARP)
#   /usr/bin/ndisc6   (IPv6 — multicast NS)
#
# On an IX fabric, arping/ndisc6-based neighbor refresh violates
# AMS-IX / SIX policy which requires a 4-hour ARP/ND cache timeout.
# Kernel NUD handles real reachability via BGP dst_confirm() so
# nothing is lost by suppressing the probe refresh.
#
# Do NOT list regular LAN bridges here — UniFi legitimately needs
# arping/ndisc6 on those for client discovery and topology.

# Example: peering fabric bridges
#br3996
#br3997
#br3998
#br3999
