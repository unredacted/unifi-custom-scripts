# conf/example.conf -- Template for switch CLI configuration
#
# Copy this file to conf/$(hostname).conf on the RUNNER machine (the
# host that SSHes into switches). The runner's hostname is used for
# config resolution, NOT the switch hostname.
#
# Config resolution (first match wins):
#   1. Explicit argument:    $1
#   2. Per-host conf:        conf/$(hostname).conf
#   3. Flat preferred:       switch-config.conf
#
# =====================================================================
# SYNTAX REFERENCE
# =====================================================================
#
# switch <user@host>
#   Begins a new switch block. All subsequent indented lines apply to
#   this switch until the next unindented "switch" directive or EOF.
#   <user@host> is the SSH destination (e.g., admin@switch1.example.net).
#   SSH key auth must be pre-configured.
#
# Interface-scoped commands (indented under a switch):
#
#   interface <port-list>
#     <command>
#
#   Enters interface context for each port in <port-list> and runs
#   <command> inside it. Multiple commands can follow on separate
#   indented lines; the interface context is re-entered for each port.
#
#   Port list syntax:
#     Single port:   0/13
#     Multiple:      0/13 0/14 0/15 0/16
#     Range:         0/13-16  (expands to 0/13 0/14 0/15 0/16)
#     Mixed:         0/1 0/3-5 0/10  (expands to 0/1 0/3 0/4 0/5 0/10)
#
# Global configure-mode commands (indented under a switch):
#
#   configure <command>
#
#   Runs <command> in configure context but NOT inside an interface.
#   Use for switch-global settings like logging, VLAN database, etc.
#
# Verification (indented under a switch):
#
#   verify <port> <show-command> <field> <expected-value>
#
#   Defines a pre/post check for a port. Before applying, the script
#   runs <show-command> and looks for <field> in the output. If the
#   current value already matches <expected-value>, the port is skipped
#   (idempotent). After applying, the check is repeated to confirm.
#
#   If no verify directives are present for a switch, commands are
#   applied unconditionally (still safe -- repeated CLI commands are
#   no-ops on the switch).
#
# ---- MONITORING ----
# The switch-config-monitor.sh daemon periodically re-runs the apply
# script since switch CLI changes do not persist across reboots.
# Default interval is 30 seconds.
#
# =====================================================================
# EXAMPLES
# =====================================================================

# ---- Disable LLDP on IXP-facing ports ----
# Range syntax: 0/25-28 expands to ports 0/25, 0/26, 0/27, 0/28
#switch admin@switch1.example.net
#  interface 0/25-28
#    no lldp transmit
#  verify 0/28 show lldp interface 0/28  Transmit  Disabled

# ---- Disable LLDP on specific (non-contiguous) ports ----
#switch admin@switch2.example.net
#  interface 0/1 0/2 0/5
#    no lldp transmit

# ---- Multiple commands per interface ----
# Each indented line under an interface block is a separate command
#switch admin@switch3.example.net
#  interface 0/9-12
#    no lldp transmit
#    no cdp enable

# ---- Global configure-mode command ----
#switch admin@core1.example.net
#  configure logging host 10.0.0.1
