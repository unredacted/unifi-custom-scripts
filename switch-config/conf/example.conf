# conf/example.conf -- Template for switch CLI configuration
#
# Copy this file to conf/$(hostname).conf on the RUNNER machine (the
# host that SSHes into switches). The runner's hostname is used for
# config resolution, NOT the switch hostname.
#
# Config resolution (first match wins):
#   1. Explicit argument:    $1
#   2. Per-host conf:        conf/$(hostname).conf
#   3. Flat preferred:       switch-config.conf
#
# =====================================================================
# SYNTAX REFERENCE
# =====================================================================
#
# switch <user@host>
#   Begins a new switch block. All subsequent indented lines apply to
#   this switch until the next unindented "switch" directive or EOF.
#   <user@host> is the SSH destination (e.g., admin@switch1.example.net).
#   SSH key auth must be pre-configured.
#
# Interface-scoped commands (indented under a switch):
#
#   interface <port-list>
#     <command>
#
#   Enters interface context for each port in <port-list> and runs
#   <command> inside it. Multiple commands can follow on separate
#   indented lines; the interface context is re-entered for each port.
#
#   Port list syntax:
#     Single port:   0/13
#     Multiple:      0/13 0/14 0/15 0/16
#     Range:         0/13-16  (expands to 0/13 0/14 0/15 0/16)
#     Mixed:         0/1 0/3-5 0/10  (expands to 0/1 0/3 0/4 0/5 0/10)
#
# Global configure-mode commands (indented under a switch):
#
#   configure <command>
#
#   Runs <command> in configure context but NOT inside an interface.
#   Use for switch-global settings like logging, VLAN database, etc.
#
# Verification (indented under a switch):
#
#   The "::" delimiter separates the show command, field name, and
#   expected value. This allows multi-word field names like
#   "BPDU Filter Mode".
#
#   verify <port> <show-command> :: <field> :: <expected-value>
#     Defines a pre/post check for a single port. Before applying, the
#     script runs <show-command> and looks for <field> in the output.
#     If the current value already matches <expected-value>, the port
#     is skipped (idempotent). After applying, the check is repeated
#     to confirm.
#
#   verify-all <show-command-template> :: <field> :: <expected-value>
#     Expands to a verify for every port in the preceding interface
#     block. The port is appended to <show-command-template> for each
#     check. For example:
#       interface 0/13-16
#         no lldp transmit
#       verify-all show lldp interface :: Transmit :: Disabled
#     expands to:
#       verify 0/13 show lldp interface 0/13 :: Transmit :: Disabled
#       verify 0/14 show lldp interface 0/14 :: Transmit :: Disabled
#       verify 0/15 show lldp interface 0/15 :: Transmit :: Disabled
#       verify 0/16 show lldp interface 0/16 :: Transmit :: Disabled
#
#   If no verify directives are present for a switch, commands are
#   applied unconditionally (still safe -- repeated CLI commands are
#   no-ops on the switch).
#
# ---- MONITORING ----
# The switch-config-monitor.sh daemon periodically re-runs the apply
# script since switch CLI changes do not persist across reboots.
# Default interval is 30 seconds.
#
# =====================================================================
# EXAMPLES
# =====================================================================

# ---- IXP port hardening ----
# Disable LLDP transmit and enable BPDU filter on peering ports.
# verify-all checks every port in the preceding interface block.
#
# "show lldp interface" output is a columnar table:
#   Interface  Link    Transmit  Receive   Notify    TLVs     Mgmt
#   ---------  ------  --------  --------  --------  -------  ----
#   0/25       Up      Disabled  Enabled   Disabled  0,1,2,3  N
#
# "show spanning-tree interface" output is key-value:
#   BPDU Filter Mode............................... Disabled
#
# Both formats are handled automatically by the verify parser.
#
#switch admin@switch1.example.net
#  interface 0/25-28
#    no lldp transmit
#    spanning-tree bpdufilter enable
#  verify-all show lldp interface :: Transmit :: Disabled
#  verify-all show spanning-tree interface :: BPDU Filter Mode :: Enabled

# ---- Disable LLDP on specific (non-contiguous) ports ----
#switch admin@switch2.example.net
#  interface 0/1 0/2 0/5
#    no lldp transmit
#  verify-all show lldp interface :: Transmit :: Disabled

# ---- Disable LLDP receive as well as transmit ----
#switch admin@switch3.example.net
#  interface 0/9-12
#    no lldp transmit
#    no lldp receive
#  verify-all show lldp interface :: Transmit :: Disabled
#  verify-all show lldp interface :: Receive :: Disabled

# ---- Single-port verify ----
#switch admin@switch4.example.net
#  interface 0/1-4
#    spanning-tree bpdufilter enable
#  verify 0/4 show spanning-tree interface 0/4 :: BPDU Filter Mode :: Enabled

# ---- Global configure-mode command ----
#switch admin@core1.example.net
#  configure logging host 10.0.0.1
